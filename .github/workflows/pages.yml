name: Deploy website (GitHub Pages)

# Vitrine publique Crohnicle (§11-sexies). Déploie UNIQUEMENT la landing statique
# `website/` sur GitHub Pages.
#
# DÉCISION (démo web NON incluse) — testée localement, preuve à l'appui :
#   L'app web (expo-router + expo-sqlite) stocke les données via wa-sqlite + OPFS,
#   ce qui exige `crossOriginIsolated` (SharedArrayBuffer), donc les en-têtes
#   Cross-Origin-Opener-Policy: same-origin + Cross-Origin-Embedder-Policy:
#   require-corp sur CHAQUE réponse (cf. scripts/serve-web.mjs).
#   GitHub Pages ne permet PAS d'en-têtes HTTP personnalisés. Servie sous
#   /openscreen/app/ SANS ces en-têtes, l'app affiche son écran d'erreur
#   (« Redémarrez l'application ») car le warmup SQLite échoue — démo cassée.
#   Loi produit : pas de démo cassée en public. La démo reste donc en local
#   (`npm run web`, documenté sur la landing et dans docs/RELEASE.md).
#   L'export web PROD reste construit et testé par la CI (ci.yml).

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Permissions minimales requises par le déploiement Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement Pages à la fois ; ne pas annuler un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble _site (landing only)
        # Tous les chemins de website/ sont RELATIFS → fonctionnent sous le
        # sous-chemin de projet https://<user>.github.io/openscreen/.
        run: |
          mkdir -p _site
          cp -r website/. _site/
          echo "Assembled _site:"
          ls -R _site | head -40
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
