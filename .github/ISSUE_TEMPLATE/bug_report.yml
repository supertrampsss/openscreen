name: Bug Report
description: Create a report to help us improve
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: checkboxes
    attributes:
      label: Search existing issues
      description: Please search to see if an issue already exists for the bug you encountered.
      options:
        - label: I have searched the existing issues
          required: true

  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: e.g., When I click submit, nothing happens...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: e.g., The form should submit and show a success message
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
      placeholder: Drag and drop images here or paste them
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Where did the bug occur?
      options:
        - iOS
        - Android
        - Web
        - Other
    validations:
      required: false

  - type: input
    id: platform-version
    attributes:
      label: OS / Platform Version
      description: Please specify your OS or platform version
      placeholder: e.g., iOS 18.2, Android 15, Chrome 120
    validations:
      required: false

  - type: input
    id: device
    attributes:
      label: Device
      description: Which device are you using?
      placeholder: e.g., iPhone 15 Pro, Pixel 8, Desktop browser
    validations:
      required: false

  - type: input
    id: app-version
    attributes:
      label: App Version
      description: Which version of Crohnicle are you running?
      placeholder: e.g., 1.0.0
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
      placeholder: Links, references, or any additional information
    validations:
      required: false
